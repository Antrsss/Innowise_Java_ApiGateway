services:
  auth-db:
    image: postgres:17-alpine
    container_name: authentication-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:17-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:17-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6380:6379"


  authentication-service:
    build: ../auth_service
    container_name: authentication-service
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://auth-db:5432/auth_db
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=auth_db
    depends_on:
      auth-db:
        condition: service_healthy

  user-service:
    build: ../advanced_course
    container_name: user-service
    ports:
      - "8082:8080"
    env_file: .env
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://user-db:5432/user_db

  order-service:
    build: ../order-service
    container_name: order-service
    ports:
      - "8083:8080"
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/order_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - USER_SERVICE_HOST=user-service:8080
    depends_on:
      order-db:
        condition: service_healthy

  api-gateway:
    build: .
    container_name: api-gateway
    ports:
      - "8060:8060"
    environment:
      - AUTH_SERVICE_URL=http://authentication-service:8081
      - USER_SERVICE_URL=http://user-service:8080
      - ORDER_SERVICE_URL=http://order-service:8080
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - authentication-service
      - user-service
      - order-service